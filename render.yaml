# Render Blueprint (optional): set Root Directory in dashboard to "backend" or use this file.
# If you still see Prisma P3009, your service is still running `prisma migrate deploy` — remove
# that from the Build command (this blueprint never runs migrate deploy).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wph-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      # Optional (set if enabling Supabase-backed staff auth)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: USE_SUPABASE_AUTH
        value: "0"
      # Optional (Stripe payments)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_CONNECT_CLIENT_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
