name: Deploy Medplum (self-host AWS)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/medplum-cdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/medplum-cdk/package-lock.json

      - name: Install
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # This workflow expects you to commit a generated config file, e.g.:
      # infra/medplum-cdk/medplum.prod.config.json
      - name: CDK deploy
        run: |
          CONFIG_FILE="${{ secrets.MEDPLUM_CDK_CONFIG_FILE }}"
          if [ -z "$CONFIG_FILE" ]; then
            echo "Missing secret MEDPLUM_CDK_CONFIG_FILE (e.g. medplum.prod.config.json)" >&2
            exit 1
          fi
          npx cdk bootstrap -c config="$CONFIG_FILE"
          npx cdk deploy --all -c config="$CONFIG_FILE" --require-approval never

