<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheatfill Precision Health</title>
    <script>
      // GitHub Pages SPA fallback:
      // store the path the user tried to load, then redirect to the app root.
      (function () {
        var l = window.location;
        var h = l.hostname;
        if (l.protocol === 'http:' && h && h !== 'localhost' && h !== '127.0.0.1') {
          l.replace(l.href.replace(/^http:/, 'https:'));
          return;
        }
        var base = '/';
        sessionStorage.setItem(
          'wph_redirect',
          l.pathname + l.search + l.hash
        );
        l.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
