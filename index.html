<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; form-action 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https: http:;"
    />
    <meta name="theme-color" content="#c4b0b0" />
    <meta name="application-name" content="Wheatfill Precision Health" />
    <!-- Android / Chrome install & standalone -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="WPH" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Wheatfill Precision Health</title>
    <script>
      // Use HTTPS on the live site (avoids “Not secure” when users or links hit http://).
      (function () {
        var h = location.hostname
        if (location.protocol !== 'http:' || !h || h === 'localhost' || h === '127.0.0.1') return
        location.replace(location.href.replace(/^http:/, 'https:'))
      })()
    </script>
    <script>
      // If we arrived here via the 404.html SPA redirect on GitHub Pages,
      // restore the original URL so React Router can render the right route.
      (function () {
        var redirect = sessionStorage.getItem('wph_redirect');
        if (!redirect) return;
        sessionStorage.removeItem('wph_redirect');
        // Custom domain uses basename "/"; strip legacy GitHub project-path prefix if present.
        var stripped = redirect.replace(/^\/Wheatfill-Precision-Health(?=\/|\?|#|$)/i, '') || '/';
        if (stripped.charAt(0) !== '/') stripped = '/' + stripped;
        window.history.replaceState(null, '', stripped);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
